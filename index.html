<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manim Animation</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(960px, 100%);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(28px, 6vw, 56px);
        line-height: 1.05;
      }

      video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #020617;
        border: 1px solid #334155;
        border-radius: 8px;
        display: block;
      }

      p {
        color: #cbd5e1;
        margin: 14px 0 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Manim Animation</h1>
      <video controls autoplay loop muted playsinline>
        <source src="./animation.mp4" type="video/mp4" />
      </video>
      <p>This page shows the Manim video rendered by GitHub Actions.</p>
    </main>
  </body>
</html>
