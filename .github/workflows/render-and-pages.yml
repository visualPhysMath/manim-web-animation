name: Render Manim and Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libcairo2-dev \
            libpango1.0-dev \
            pkg-config \
            python3-dev \
            dvisvgm \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Render animation
        run: manim -qm main.py

      - name: Prepare site
        run: |
          mkdir -p public
          cp index.html public/index.html
          rendered_video="$(find media/videos/main/720p30 -maxdepth 1 -name '*.mp4' | head -n 1)"
          if [ -z "$rendered_video" ]; then
            echo "No rendered video found"
            exit 1
          fi
          cp "$rendered_video" public/animation.mp4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: render
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
